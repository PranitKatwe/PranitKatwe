<svg viewBox="0 0 1000 296" width="1000" height="296" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Capabilities: agents (LangGraph, CrewAI, MCP, LangChain, RAG with FAISS, LangSmith, Bedrock, Vertex AI), ML (PyTorch, TensorFlow, XGBoost, LightGBM, scikit-learn), data (Snowflake, Kafka, Spark, Airflow, PostgreSQL, Redis), backend (FastAPI, Flask, Django, Docker, Kubernetes, AWS, GCP), statistics, and Python, SQL, R, JavaScript.">
  <style>
    .mono { font-family: ui-monospace, "Cascadia Code", "JetBrains Mono", Consolas, Menlo, monospace; }
    .rise { opacity: 0; transform: translateY(8px); animation: rise .5s ease forwards; }
    .d0 { animation-delay: .15s; } .d1 { animation-delay: .35s; } .d2 { animation-delay: .5s; }
    .d3 { animation-delay: .65s; } .d4 { animation-delay: .8s; } .d5 { animation-delay: .95s; }
    .d6 { animation-delay: 1.1s; } .d7 { animation-delay: 1.25s; }
    .rule { stroke-dasharray: 1; stroke-dashoffset: 1; animation: draw 1s ease .2s forwards; }
    .cursor { opacity: 0; animation: blink 1.1s step-end 1.6s infinite; }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  </style>

  <rect x="1" y="1" width="998" height="294" rx="14" fill="#0A0A0A" stroke="#2a2a2a" stroke-width="1.5"/>

  <text class="mono rise d0" x="60" y="52" font-size="14" letter-spacing="5" fill="#38BDF8">CAPABILITIES</text>
  <text class="mono rise d0" x="290" y="52" font-size="13" fill="#444444">tool_use.yaml</text>
  <text class="mono rise d0" x="940" y="52" text-anchor="end" font-size="13" fill="#444444">[02]</text>
  <line class="rule" pathLength="1" x1="420" y1="47" x2="898" y2="47" stroke="#2a2a2a" stroke-width="1"/>

  <text class="mono rise d1" x="76" y="98" text-anchor="end" font-size="14" fill="#333333">1</text>
  <text class="mono rise d1" x="96" y="98" font-size="14" fill="#E8E8E8">tool_use:</text>

  <text class="mono rise d2" x="76" y="126" text-anchor="end" font-size="14" fill="#333333">2</text>
  <text class="mono rise d2" x="96" y="126" font-size="14"><tspan fill="#38BDF8">  agents:</tspan><tspan fill="#999999">      [LangGraph, CrewAI, MCP, LangChain, RAG + FAISS, LangSmith, Bedrock, Vertex AI]</tspan></text>

  <text class="mono rise d3" x="76" y="154" text-anchor="end" font-size="14" fill="#333333">3</text>
  <text class="mono rise d3" x="96" y="154" font-size="14"><tspan fill="#38BDF8">  ml:</tspan><tspan fill="#999999">          [PyTorch, TensorFlow, XGBoost, LightGBM, scikit-learn, TabTransformer]</tspan></text>

  <text class="mono rise d4" x="76" y="182" text-anchor="end" font-size="14" fill="#333333">4</text>
  <text class="mono rise d4" x="96" y="182" font-size="14"><tspan fill="#38BDF8">  data:</tspan><tspan fill="#999999">        [Snowflake, Kafka, Spark, Airflow, PostgreSQL, MongoDB, Redis, pandas]</tspan></text>

  <text class="mono rise d5" x="76" y="210" text-anchor="end" font-size="14" fill="#333333">5</text>
  <text class="mono rise d5" x="96" y="210" font-size="14"><tspan fill="#38BDF8">  backend:</tspan><tspan fill="#999999">     [FastAPI, Flask, Django, Docker, Kubernetes, AWS, GCP]</tspan></text>

  <text class="mono rise d6" x="76" y="238" text-anchor="end" font-size="14" fill="#333333">6</text>
  <text class="mono rise d6" x="96" y="238" font-size="14"><tspan fill="#38BDF8">  statistics:</tspan><tspan fill="#999999">  [hypothesis testing, A/B testing, causal inference, time series]</tspan></text>

  <text class="mono rise d7" x="76" y="266" text-anchor="end" font-size="14" fill="#333333">7</text>
  <text class="mono rise d7" x="96" y="266" font-size="14"><tspan fill="#38BDF8">  languages:</tspan><tspan fill="#999999">   [Python, SQL, R, JavaScript]</tspan></text>
  <rect class="cursor" x="470" y="254" width="9" height="16" fill="#38BDF8"/>
</svg>
