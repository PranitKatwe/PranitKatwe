<svg viewBox="0 0 1000 216" width="1000" height="216" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Known limitations: replies too fast; will replace your $10K/month vendor with a Python script if left unsupervised; once ran 3 training jobs in parallel until VRAM was exhausted; runs exclusively on black coffee, no sugar.">
  <style>
    .mono { font-family: ui-monospace, "Cascadia Code", "JetBrains Mono", Consolas, Menlo, monospace; }
    .rise { opacity: 0; transform: translateY(8px); animation: rise .5s ease forwards; }
    .d0 { animation-delay: .15s; } .d1 { animation-delay: .35s; } .d2 { animation-delay: .55s; }
    .d3 { animation-delay: .75s; } .d4 { animation-delay: .95s; }
    .rule { stroke-dasharray: 1; stroke-dashoffset: 1; animation: draw 1s ease .2s forwards; }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }
    @keyframes draw { to { stroke-dashoffset: 0; } }
  </style>

  <rect x="1" y="1" width="998" height="214" rx="14" fill="#0A0A0A" stroke="#2a2a2a" stroke-width="1.5"/>

  <text class="mono rise d0" x="60" y="52" font-size="14" letter-spacing="5" fill="#38BDF8">KNOWN LIMITATIONS</text>
  <text class="mono rise d0" x="940" y="52" text-anchor="end" font-size="13" fill="#444444">[05]</text>
  <line class="rule" pathLength="1" x1="340" y1="47" x2="898" y2="47" stroke="#2a2a2a" stroke-width="1"/>

  <text class="mono rise d1" x="60" y="100" font-size="14"><tspan fill="#666666">[WARN] </tspan><tspan fill="#E8E8E8">replies too fast — it's a problem</tspan></text>
  <text class="mono rise d2" x="60" y="130" font-size="14"><tspan fill="#666666">[WARN] </tspan><tspan fill="#E8E8E8">will replace your $10K/month vendor with a Python script if left unsupervised</tspan></text>
  <text class="mono rise d3" x="60" y="160" font-size="14"><tspan fill="#666666">[WARN] </tspan><tspan fill="#E8E8E8">once ran 3 training jobs in parallel — GPU at 100%, VRAM exhausted, no regrets</tspan></text>
  <text class="mono rise d4" x="60" y="190" font-size="14"><tspan fill="#666666">[WARN] </tspan><tspan fill="#E8E8E8">runs exclusively on black coffee, no sugar — this parameter is frozen</tspan></text>
</svg>
