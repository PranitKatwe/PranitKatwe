  <text class="mono rise d1" x="940" y="178" text-anchor="end" font-size="12" fill="#444444">github.com/PranitKatwe/equity-filing-delta</text>

  <!-- 02 repo-oracle -->
  <text class="mono rise d2" x="60" y="214" font-size="15"><tspan fill="#38BDF8">▸ </tspan><tspan fill="#E8E8E8" font-weight="700">repo-oracle</tspan></text>
  <text class="mono rise d2" x="940" y="214" text-anchor="end" font-size="12" fill="#666666">MCP · Cursor Hackathon Denver 2025</text>
  <text class="mono rise d2" x="88" y="240" font-size="13" fill="#999999">6-tool MCP server letting LLMs query GitHub repos inside Cursor IDE · ~40% fewer redundant API calls</text>
  <text class="mono rise d2" x="88" y="264" font-size="12.5" fill="#666666">[Python · FastMCP · GitHub API]</text>
  <text class="mono rise d2" x="940" y="264" text-anchor="end" font-size="12" fill="#444444">github.com/PranitKatwe/repo-oracle</text>

