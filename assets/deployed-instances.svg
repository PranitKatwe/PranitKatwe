<svg viewBox="0 0 1000 596" width="1000" height="596" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Deployed instances: Filing-Delta Event Signal (equity-filing-delta.vercel.app, github.com/PranitKatwe/equity-filing-delta) — SEC 10-K risk-text event study, 480 companies, 4,705 filings, honest null result. Repo Oracle — 6-tool MCP server for querying GitHub repos in Cursor IDE. DocSumAI — cloud LLM document summarization. SBA Loan Eligibility — stacked ensemble, 87% accuracy. Ray open-source contribution. All projects at github.com/PranitKatwe.">
  <style>
    .mono { font-family: ui-monospace, "Cascadia Code", "JetBrains Mono", Consolas, Menlo, monospace; }
    .rise { animation: rise .5s ease backwards; }
    .d0 { animation-delay: .15s; } .d1 { animation-delay: .35s; } .d2 { animation-delay: .55s; }
    .d3 { animation-delay: .75s; } .d4 { animation-delay: .95s; } .d5 { animation-delay: 1.15s; }
    .d6 { animation-delay: 1.45s; }
    .rule { stroke-dasharray: 1; animation: draw 1s ease .2s backwards; }
    .rule2 { stroke-dasharray: 1; animation: draw 1s ease 1.3s backwards; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes draw { from { stroke-dashoffset: 1; } to { stroke-dashoffset: 0; } }
  </style>

  <rect x="1" y="1" width="998" height="594" rx="14" fill="#0A0A0A" stroke="#2a2a2a" stroke-width="1.5"/>

  <text class="mono rise d0" x="60" y="52" font-size="14" letter-spacing="5" fill="#38BDF8">DEPLOYED INSTANCES</text>
  <text class="mono rise d0" x="360" y="52" font-size="12" fill="#444444">// URLs are plain text — type them, they work</text>
  <text class="mono rise d0" x="940" y="52" text-anchor="end" font-size="13" fill="#444444">[04]</text>
  <line class="rule" pathLength="1" x1="60" y1="64" x2="940" y2="64" stroke="#2a2a2a" stroke-width="1"/>

  <!-- 01 filing-delta -->
  <text class="mono rise d1" x="60" y="104" font-size="15"><tspan fill="#38BDF8">▸ </tspan><tspan fill="#E8E8E8" font-weight="700">filing-delta-event-signal</tspan></text>
  <text class="mono rise d1" x="940" y="104" text-anchor="end" font-size="12" fill="#666666">live → equity-filing-delta.vercel.app</text>
  <text class="mono rise d1" x="88" y="130" font-size="13" fill="#999999">Event study: do changes in SEC 10-K risk text predict abnormal returns? 480 companies · 4,705 filings</text>
  <text class="mono rise d1" x="88" y="154" font-size="13" fill="#999999">Verdict: real but weak, dies after costs. "The chart goes nowhere. That's the point."</text>
