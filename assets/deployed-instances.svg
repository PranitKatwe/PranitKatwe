  <text class="mono rise d3" x="60" y="300" font-size="15"><tspan fill="#38BDF8">▸ </tspan><tspan fill="#E8E8E8" font-weight="700">docsum-ai</tspan></text>
  <text class="mono rise d3" x="940" y="300" text-anchor="end" font-size="12" fill="#666666">DEPLOYED · GCP</text>
  <text class="mono rise d3" x="88" y="326" font-size="13" fill="#999999">Cloud LLM document summarization · PDF/DOCX/TXT · 10K+ word docs via token-safe chunking · 10s → 6s</text>
  <text class="mono rise d3" x="88" y="350" font-size="12.5" fill="#666666">[Flask · GCP Pub/Sub · BART · GPT-4o · Docker]</text>
  <text class="mono rise d3" x="940" y="350" text-anchor="end" font-size="12" fill="#444444">github.com/PranitKatwe/DocSumAI-LLM-Powered-Summary</text>

  <!-- 04 sba-loan -->
  <text class="mono rise d4" x="60" y="386" font-size="15"><tspan fill="#38BDF8">▸ </tspan><tspan fill="#E8E8E8" font-weight="700">sba-loan-eligibility</tspan></text>
  <text class="mono rise d4" x="940" y="386" text-anchor="end" font-size="12" fill="#666666">RESEARCH</text>
  <text class="mono rise d4" x="88" y="412" font-size="13" fill="#999999">Stacked ensemble · 87% accuracy across 4 loan types · 30%+ minority-class recall gain · SHAP/LIME</text>
  <text class="mono rise d4" x="88" y="436" font-size="12.5" fill="#666666">[XGBoost · LightGBM · TabTransformer · SHAP]</text>
  <text class="mono rise d4" x="940" y="436" text-anchor="end" font-size="12" fill="#444444">github.com/PranitKatwe/ai-driven-sba-loan-eligibility-system</text>

  <!-- 05 ray-contrib -->
  <text class="mono rise d5" x="60" y="472" font-size="15"><tspan fill="#38BDF8">▸ </tspan><tspan fill="#E8E8E8" font-weight="700">ray-contrib</tspan></text>
  <text class="mono rise d5" x="940" y="472" text-anchor="end" font-size="12" fill="#666666">OPEN SOURCE · Apache Ray</text>
  <text class="mono rise d5" x="88" y="498" font-size="13" fill="#999999">Fixed ArrowNotImplementedError enabling PyArrow compatibility · dedup API used in ML preprocessing</text>
  <text class="mono rise d5" x="88" y="522" font-size="12.5" fill="#666666">[Python · PyArrow · Ray Datasets]</text>
  <text class="mono rise d5" x="940" y="522" text-anchor="end" font-size="12" fill="#444444">github.com/PranitKatwe/ray</text>

  <line class="rule2" pathLength="1" x1="60" y1="546" x2="940" y2="546" stroke="#2a2a2a" stroke-width="1"/>
  <text class="mono rise d6" x="60" y="572" font-size="12" fill="#444444">+ earlier checkpoints: unipredict · shoptalk · breast-cancer-nn · steamplay · electromobility</text>
